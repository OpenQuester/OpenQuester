name: openquester_monorepo
publish_to: none

environment:
  sdk: ^3.11.0

workspace:
  - packages/*
  - apps/*

dev_dependencies:
  melos: ^7.8.1

melos:
  scripts:
    # =============================================================================
    # MAIN BUILD PIPELINES
    # =============================================================================

    pre_run:
      description: Full build pipeline - generates API, builds packages, runs pre-run tasks, indexes, and formats
      steps:
        - melos run pre_build
        - melos run gen_indexes
        - melos run format
        - notify-send -u normal "Build Complete" "pre_run finished successfully" 2>/dev/null || true

    pre_build:
      description: Pre-run tasks generating files, workers, and localization
      steps:
        - melos run gen_api
        - melos run gen_files
        - melos run gen_workers
        - melos run gen_locale

    pre_build_package:
      description: Build pipeline for individual packages (skips API generation)
      steps:
        - melos run pre_build
        - melos run gen_indexes
        - melos run format

    # =============================================================================
    # CODE GENERATION
    # =============================================================================

    gen_files:
      description: Run build_runner to generate code for all packages that require it
      # --depends-on ensures this only runs in packages that actually have build_runner
      run: melos exec --depends-on="build_runner" -- "dart run build_runner build -d"

    clean_build_runner:
      description: Clean build_runner cache and generated files
      run: melos exec --depends-on="build_runner" -- "dart run build_runner clean"

    gen_locale:
      description: Generate localization keys from JSON files
      # Replace 'your_main_app' with the actual folder name of your main project
      run: melos exec --scope="openquester" -- "flutter pub run easy_localization:generate -f keys -o locale_keys.g.dart -S assets/localization/"

    gen_indexes:
      description: Generate index files (barrel exports)
      run: |
        if grep -q "^index_generator:" pubspec.yaml; then
          dart pub global run index_generator
        else
          echo "Skipping index generation: no index_generator config found in pubspec.yaml"
        fi

    gen_api:
      description: Generate API client code from OpenAPI specs
      steps:
        - melos exec --scope="openapi" -- "dart run swagger_parser"
        - melos exec --scope="openapi" -- "dart run build_runner build -d"

    gen_workers:
      description: Generate JS and WASM web workers
      run: >
        melos exec --scope="client"
        -- "dart compile js -O2 ./lib/workers/package_service.web.g.dart -o ./web/workers/package_service.web.g.dart.js &&
            dart compile wasm ./lib/workers/package_service.web.g.dart -o ./web/workers/package_service.web.g.dart.wasm"

    # =============================================================================
    # CODE QUALITY
    # =============================================================================

    analyze:
      description: Analyze Dart code for all packages
      run: melos exec -- "dart analyze --fatal-infos ."

    test:
      description: Run tests for all packages
      run: melos exec -- "dart test"

    fix:
      description: Apply automated fixes for linting issues
      run: melos exec -- "dart fix --apply"

    format:
      description: Run dart format on all packages
      run: melos exec -- "dart format lib"

    format_exception:
      description: Run dart format on files that are exceptions to the standard formatting rules
      run: dart run scripts/run_format_exception.dart

    # =============================================================================
    # DEPENDENCY MANAGEMENT
    # =============================================================================

    upgrade:
      description: Upgrade dependencies for all packages
      run: melos exec -- "flutter pub upgrade"
      # Note: If you want to pass flags like `--major-versions`, you run:
      # melos run upgrade -- --major-versions

    # =============================================================================
    # PLATFORM-SPECIFIC
    # =============================================================================

    windows_bundle:
      description: Create Windows MSIX installer bundle
      run: melos exec --scope="openquester" -- "dart run msix:create"
