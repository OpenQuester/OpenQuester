name: openquester
description: "A new Flutter project."
publish_to: "none"
version: 0.22.0

environment:
  sdk: ^3.11.0
  flutter: 3.44.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Local packages
  openapi: any
  siq_file: any
  oq_compress: any
  oq_editor: any
  oq_shared: any
  #

  auto_route: ^11.1.0
  envied: ^1.3.5
  package_info_plus: ^9.0.1
  flutter_native_splash: ^2.4.8
  dio: ^5.9.2
  file_picker: ^11.0.2
  injectable: ^3.0.0
  get_it: ^9.2.1
  watch_it: ^2.4.2
  shared_preferences: ^2.5.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  universal_io: ^2.3.1
  socket_io_client: ^3.1.6
  easy_localization: ^3.0.8
  infinite_scroll_pagination: ^5.1.1
  nb_utils: ^7.3.5
  dio_cache_interceptor: ^4.0.6
  oauth2_client: ^4.3.2
  dio_cookie_manager: ^3.4.0
  path_provider: ^2.1.6
  cookie_jar: ^4.0.9
  flutter_web_auth_2: ^5.0.3
  universal_web: ^1.1.1+1
  cross_file: ^0.3.5+2
  squadron: ^7.4.3
  collection: ^1.19.1
  flutter_chat_core: ^2.9.0
  flutter_chat_ui: ^2.11.1
  cached_network_image: ^3.4.1
  cached_network_image_platform_interface: ^4.1.1
  fetch_client: ^1.2.1
  crypto: ^3.0.7
  flutter_svg: ^2.3.0
  mocktail: ^1.0.5
  updat: ^1.4.0
  throttling: ^2.0.1
  url_launcher: ^6.3.2
  video_player: ^2.11.1
  video_player_win: ^3.2.2
  toastification: ^3.2.0
  dotted_border: ^3.1.0
  flutter_cache_manager: ^3.4.1
  animate_do: ^5.1.0
  talker: ^5.1.17
  talker_flutter: ^5.1.16
  talker_dio_logger: ^5.1.17
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  analyzer: ^10.2.0
  auto_route_generator: ^10.5.0
  flutter_launcher_icons: ^0.14.4
  envied_generator: ^1.3.5
  injectable_generator: ^3.0.2
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  test: ^1.31.0
  flutter_gen_runner: ^5.14.1
  very_good_analysis: ^10.3.0
  squadron_builder: ^9.3.0
  inno_bundle: ^0.11.2

flutter:
  uses-material-design: true
  assets:
    - assets/localization/
    - assets/icons/

flutter_gen:
  output: lib/generated/
  integrations:
    flutter_svg: true

msix_config:
  display_name: OpenQuester
  identity_name: com.asion.openquester
  logo_path: assets/icon/icon.png
  capabilities: internetClient
  languages: en-us
  file_extension: .siq
  install_certificate: false

inno_bundle:
  id: 2c5b1f10-2d9d-11f0-947a-894be89259d5
  name: OpenQuester
  publisher: OpenQuester
  installer_icon: assets/icon/icon.ico
  url: https://openquester.app/
  updates_url: https://github.com/OpenQuester/OpenQuester/releases
  admin: false
  languages:
    - english

melos:
  scripts:
    gen_workers:
      description: Generate JS and WASM web workers
      run: |
        dart compile js -O2 "./lib/workers/package_service.web.g.dart" -o "./web/workers/package_service.web.g.dart.js" && \
        dart compile wasm "./lib/workers/package_service.web.g.dart" -o "./web/workers/package_service.web.g.dart.wasm"
